  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pad-x: 8vw;
      --base-size: clamp(50px, 7vw, 104px);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      height: 250vh;
      background: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hero {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: var(--pad-x);
      padding-right: 24px;
      pointer-events: none;
    }

    .stack {
      max-width: 1600px;
    }

    .typing-line {
      min-height: 1em;
      white-space: nowrap;
      line-height: 0.9;
      letter-spacing: -0.045em;
      color: #fff;
      font-weight: 400;
    }

    /* overlap tikai top rindām */
    .line-2,
    .line-3,
    .line-4,
    .line-5 {
      margin-top: -0.17em;
    }

    .line-1 { font-size: var(--base-size); }
    .line-2 { font-size: calc(var(--base-size) - 2px); }
    .line-3 { font-size: calc(var(--base-size) - 4px); }
    .line-4 { font-size: calc(var(--base-size) - 6px); }
    .line-5 { font-size: calc(var(--base-size) - 8px); }

    .gap-large {
      height: 44px;
      min-height: 44px;
    }

    .line-6 {
      font-size: clamp(28px, 2.8vw, 42px);
      line-height: 1.04;
      letter-spacing: -0.03em;
      font-style: italic;
      color: #fff;
    }

    .social-gap {
      height: 25px;
      min-height: 0px;
    }

    .line-7 {
      font-size: clamp(17px, 1.35vw, 22px);
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: #fff;
      pointer-events: auto;
    }

    .line-5 a,
    .line-7 a {
      pointer-events: auto;
      color: #fff;
      transition: opacity 0.18s ease;
    }

    .line-5 a:hover,
    .line-7 a:hover {
      opacity: 0.72;
    }

    .cursor {
      display: inline-block;
      width: 0.08em;
      height: 0.92em;
      background: #fff;
      margin-left: 0.08em;
      vertical-align: -0.08em;
      opacity: 1;
    }

    .cursor.is-off {
      opacity: 0;
    }

    .scroll-indicator {
      position: fixed;
      bottom: 28px;
      left: 8vw;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.65;
      color: #fff;
      pointer-events: none;
    }

    @media (max-width: 980px) {

    @media (prefers-reduced-motion: reduce) {
      html {

<body>

  <section class="hero">
    <div class="stack">
      <div class="typing-line line-1"><span id="line1"></span></div>
      <div class="typing-line line-2"><span id="line2"></span></div>
      <div class="typing-line line-3"><span id="line3"></span></div>
      <div class="typing-line line-4"><span id="line4"></span></div>
      <div class="typing-line line-5"><span id="line5"></span></div>

      <div class="gap-large"></div>

      <div class="typing-line line-6"><span id="line6"></span></div>
      <div class="social-gap"></div>
      <div class="typing-line line-7"><span id="line7"></span></div>
    </div>
  </section>

  <div class="scroll-indicator">Scroll</div>

  <script>
    const line1Text = "Mārtiņš Priedītis (Martins Prieditis)";
    const line2Text = "New Media & Creative AI";
    const line3Text = "Human–AI Interaction";
    const line4Text = "Audiovisual Systems Designer";
    const line5Plain = "Founder @reverie™";
    const line5Html = 'Founder <a href="https://www.reverie.lv" target="_blank" rel="noopener noreferrer">@reverie™</a>';

    const line6Text = "Machine Hermeneutics as Artistic Practice";

    const line7Plain = "in | orcid | ig | yt | tiktok | email | call";
    const line7Html = `
      <a href="https://www.linkedin.com/in/martins-prieditis" target="_blank" rel="noopener noreferrer">in</a>
      |
      <a href="https://orcid.org/0009-0006-7257-5139" target="_blank" rel="noopener noreferrer">orcid</a>
      |
      <a href="https://www.instagram.com/martins.prieditis" target="_blank" rel="noopener noreferrer">ig</a>
      |
      <a href="https://www.youtube.com/@martinsprieditis" target="_blank" rel="noopener noreferrer">yt</a>
      |
      <a href="https://www.tiktok.com/@martins.prieditis" target="_blank" rel="noopener noreferrer">tiktok</a>
      |
      <a href="mailto:martins@prieditis.eu">email</a>
      |
      <a href="tel:+37126022841">call</a>
    `;

    const line1El = document.getElementById("line1");
    const line2El = document.getElementById("line2");
    const line3El = document.getElementById("line3");
    const line4El = document.getElementById("line4");
    const line5El = document.getElementById("line5");
    const line6El = document.getElementById("line6");
    const line7El = document.getElementById("line7");

    const cursor = document.createElement("span");
    cursor.className = "cursor";

    const lines = [
      line1Text,
      line2Text,
      line3Text,
      line4Text,
      line5Plain,
      line6Text,
      line7Plain
    ];

    const totalChars = lines.reduce((sum, line) => sum + line.length, 0);

    let activeTarget = null;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function renderPartialLinkedText(container, fullPlain, fullHtml, count) {
      if (count <= 0) {
        container.innerHTML = "";
        return;
      }

      if (count >= fullPlain.length) {
        container.innerHTML = fullHtml;
        return;
      }

      container.textContent = fullPlain.slice(0, count);
    }

    function setCursorTarget(target) {
      activeTarget = target;
    }

    function mountCursor() {
      if (activeTarget && cursor.parentNode !== activeTarget) {
        activeTarget.appendChild(cursor);
      }
    }

    function updateTyping() {
      const introDelay = window.innerHeight * 0.12;
      const start = introDelay;
      const end = window.innerHeight * 0.88;

      let progress = (window.scrollY - start) / (end - start);
      progress = clamp(progress, 0, 1);

      const visibleChars = Math.floor(totalChars * progress);

      let remaining = visibleChars;

      const c1 = clamp(remaining, 0, line1Text.length);
      remaining -= c1;

      const c2 = clamp(remaining, 0, line2Text.length);
      remaining -= c2;

      const c3 = clamp(remaining, 0, line3Text.length);
      remaining -= c3;

      const c4 = clamp(remaining, 0, line4Text.length);
      remaining -= c4;

      const c5 = clamp(remaining, 0, line5Plain.length);
      remaining -= c5;

      const c6 = clamp(remaining, 0, line6Text.length);
      remaining -= c6;

      const c7 = clamp(remaining, 0, line7Plain.length);

      line1El.textContent = line1Text.slice(0, c1);
      line2El.textContent = line2Text.slice(0, c2);
      line3El.textContent = line3Text.slice(0, c3);
      line4El.textContent = line4Text.slice(0, c4);
      line6El.textContent = line6Text.slice(0, c6);

      renderPartialLinkedText(line5El, line5Plain, line5Html, c5);
      renderPartialLinkedText(line7El, line7Plain, line7Html, c7);

      const b1 = line1Text.length;
      const b2 = b1 + line2Text.length;
      const b3 = b2 + line3Text.length;
      const b4 = b3 + line4Text.length;
      const b5 = b4 + line5Plain.length;
      const b6 = b5 + line6Text.length;

      if (visibleChars < b1) {
        setCursorTarget(line1El);
      } else if (visibleChars < b2) {
        setCursorTarget(line2El);
      } else if (visibleChars < b3) {
        setCursorTarget(line3El);
      } else if (visibleChars < b4) {
        setCursorTarget(line4El);
      } else if (visibleChars < b5) {
        setCursorTarget(line5El);
      } else if (visibleChars < b6) {
        setCursorTarget(line6El);
      } else {
        setCursorTarget(line7El);
      }

      mountCursor();
    }

    setInterval(() => {
      cursor.classList.toggle("is-off");
    }, 530);

    window.addEventListener("scroll", updateTyping, { passive: true });
    window.addEventListener("resize", updateTyping);
    window.addEventListener("load", () => {
      setCursorTarget(line1El);
      mountCursor();
      updateTyping();
    });

    setCursorTarget(line1El);
    mountCursor();
  </script>
<!-- ===== DIAGONAL MID-BAND WAVE EFFECT START ===== -->

<svg width="0" height="0" style="position:absolute">
  <filter id="water-ripple-filter">
    <feTurbulence
      id="water-turbulence"
      type="fractalNoise"
      baseFrequency="0.010 0.020"
      numOctaves="2"
      seed="4"
      result="noise"
    />
    <feDisplacementMap
      id="water-displacement"
      in="SourceGraphic"
      in2="noise"
      scale="0"
      xChannelSelector="R"
      yChannelSelector="G"
    />
  </filter>
</svg>

<style>
  .hero.water-ripple-active {
    filter: url(#water-ripple-filter);
    will-change: filter;
  }

  .hero.water-ripple-active .typing-line {
    will-change: transform;
  }
</style>

<script>
  const ENABLE_WATER_RIPPLE = true;
  const WATER_TRIGGER_PROGRESS = 0.985;   // testam vari likt 0.7
  const WATER_COOLDOWN_MS = 2200;

  if (ENABLE_WATER_RIPPLE) {
    const heroEl = document.querySelector(".hero");
    const lineEls = Array.from(document.querySelectorAll(".typing-line"));
    const turbEl = document.getElementById("water-turbulence");
    const dispEl = document.getElementById("water-displacement");

    let waterLastTrigger = 0;
    let waterArmed = true;
    let waterAnimating = false;
    let lineBaseCenters = [];

    function getScrollProgress() {
      const scrollTop = window.pageYOffset || window.scrollY || 0;
      const doc = document.documentElement;
      const body = document.body;

      const scrollHeight = Math.max(
        body.scrollHeight, doc.scrollHeight,
        body.offsetHeight, doc.offsetHeight,
        body.clientHeight, doc.clientHeight
      );

      const maxScroll = Math.max(1, scrollHeight - window.innerHeight);
      return scrollTop / maxScroll;
    }

    function cacheLineCenters() {
      lineBaseCenters = lineEls.map(el => {
        const r = el.getBoundingClientRect();
        return {
          el,
          x: r.left + r.width * 0.5,
          y: r.top + r.height * 0.5
        };
      });
    }

    function resetLineTransforms() {
      for (const item of lineBaseCenters) {
        item.el.style.transform = "";
      }
    }

    function triggerWaterRipple() {
      const now = Date.now();
      if (waterAnimating) return;
      if (now - waterLastTrigger < WATER_COOLDOWN_MS) return;

      waterLastTrigger = now;
      waterAnimating = true;

      cacheLineCenters();

      heroEl.classList.remove("water-ripple-active");
      void heroEl.offsetWidth;
      heroEl.classList.add("water-ripple-active");

      const duration = 1450;
      const start = performance.now();

      // diagonālais vilnis: no bottom-right uz top-left
      const startX = window.innerWidth * 1.10;
      const startY = window.innerHeight * 0.95;
      const endX   = window.innerWidth * -0.10;
      const endY   = window.innerHeight * 0.05;

      // diagonāles normāle — lai dabūtu "band" biezumu
      const dx = endX - startX;
      const dy = endY - startY;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len;
      const ny =  dx / len;

      function animateFrame(t) {
        const p = Math.min((t - start) / duration, 1);

        // viļņa centrs pārvietojas pa diagonāli
        const cx = startX + dx * p;
        const cy = startY + dy * p;

        // envelope = 0 -> max -> 0
        const envelope = Math.sin(p * Math.PI);

        // SVG displacement
        const chaoticA = Math.sin(p * Math.PI * 4.1) * 0.24;
        const chaoticB = Math.cos(p * Math.PI * 2.7) * 0.18;

        const scale = Math.max(0, envelope * (46 + chaoticA * 16));
        const freqX = 0.009 + envelope * 0.006 + Math.max(0, chaoticB) * 0.002;
        const freqY = 0.018 + envelope * 0.010 + Math.max(0, chaoticA) * 0.003;

        dispEl.setAttribute("scale", scale.toFixed(2));
        turbEl.setAttribute("baseFrequency", `${freqX.toFixed(4)} ${freqY.toFixed(4)}`);
        turbEl.setAttribute("seed", String(4 + Math.floor(p * 7)));

        // lokāla deformācija tikai tiem elementiem, kam diagonālais vilnis iet pāri
        for (const item of lineBaseCenters) {
          // attālums līdz diagonālajai vilņa centra līnijai
          const rx = item.x - cx;
          const ry = item.y - cy;

          // projekcija uz normāli = cik tālu no "band" centra
          const distFromBand = Math.abs(rx * nx + ry * ny);

          // viļņa joslas biezums
          const bandWidth = 120;

          // falloff 1 joslas vidū, 0 ārpus tās
          const band = Math.max(0, 1 - distFromBand / bandWidth);

          // mazliet haoss
          const wobble = Math.sin((p * 12) + item.y * 0.01) * 0.35;

          // diagonāla stumšana pa viļņa virzienu
          const moveX = (-dx / len) * band * (18 + wobble * 6) * envelope;
          const moveY = (-dy / len) * band * (18 + wobble * 6) * envelope;

          // neliela šķērsa deformācija pa normāli
          const skewX = nx * band * (8 + wobble * 2) * envelope;
          const skewY = ny * band * (8 + wobble * 2) * envelope;

          item.el.style.transform =
            `translate(${moveX.toFixed(2)}px, ${moveY.toFixed(2)}px) ` +
            `skew(${(skewX * 0.08).toFixed(2)}deg, ${(skewY * 0.08).toFixed(2)}deg)`;
        }

        if (p < 1) {
          requestAnimationFrame(animateFrame);
        } else {
          dispEl.setAttribute("scale", "0");
          turbEl.setAttribute("baseFrequency", "0.010 0.020");
          turbEl.setAttribute("seed", "4");
          heroEl.classList.remove("water-ripple-active");
          resetLineTransforms();
          waterAnimating = false;
        }
      }

      requestAnimationFrame(animateFrame);
    }

    function checkWaterRippleTrigger() {
      const progress = getScrollProgress();

      if (progress >= WATER_TRIGGER_PROGRESS) {
        if (waterArmed) {
          triggerWaterRipple();
          waterArmed = false;
        }
      } else {
        waterArmed = true;
      }
    }

    window.addEventListener("scroll", checkWaterRippleTrigger, { passive: true });
    window.addEventListener("resize", () => {
      resetLineTransforms();
      checkWaterRippleTrigger();
    });
    window.addEventListener("load", checkWaterRippleTrigger);
  }
</script>

<!-- ===== DIAGONAL MID-BAND WAVE EFFECT END ===== -->
